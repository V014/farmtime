        <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
            <!-- Navbar Brand-->
            <a class="navbar-brand ps-3" id="sidebarToggle" href="#">FarmTime</a>

            <!-- Navbar-->

        <div id="layoutSidenav">
            <div id="layoutSidenav_nav">
                <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                    <!-- Navbar placeholder -->
                    <div id="nav-placeholder"></div>
                </nav>
            </div>
            <div id="layoutSidenav_content">
                <main>
                    <div class="container-fluid px-4">
                        <h1 class="mt-4">Add crop</h1>
                        <ol class="breadcrumb mb-4">
                            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                            <li class="breadcrumb-item active"><a href="crops.html">Crops</a></li>
                        </ol>
                        <!-- form -->
                        <div class="card mb-4">
                            <div class="card-body">
                                <b>To add a crop, fill in all the fields below.</b>
                                <div class="form-group mb-2">
                                    <label for="crop_variety">Crop variety</label>
                                    <select id="crop_variety" class="form-control">
                                        <option value="">Unspecified</option>
                                        <!-- user crop varieties appear here -->
                                    </select>
                                </div>

                                <div class="form-group mb-2">
                                    <label for="plot">Plot</label>
                                    <select id="plot" class="form-control">
                                        <option value="">Unspecified</option>
                                        <!-- user plots appear here -->
                                    </select>
                                </div>

                                <div class="form-group mb-2">
                                    <label for="supplier">Supplier</label>
                                    <select id="supplier" class="form-control">
                                        <option value="">Unspecified</option>
                                        <!-- user suppliers appear here -->
                                    </select>
                                </div>

                                <div class="form-group mb-2">
                                    <label for="batch_number">Batch number</label>
                                    <input type="text" id="batch_number" class="form-control" placeholder="e.g. bt001">
                                </div>

                                <div class="form-group mb-2">
                                    <label for="gowth_stage">Growth stage</label>
                                    <select id="growth_stage" class="form-control">
                                        <option value="unspecified">Unspecified</option>
                                        <option value="seedling">Seedling</option>
                                        <option value="shooting">Shooting</option>
                                        <option value="flowering">Flowering</option>
                                        <option value="fruiting">Fruiting</option>
                                        <option value="harvested">Harvested</option>
                                    </select>
                                </div>

                                <div class="form-group mb-2">
                                    <label for="status">Status</label>
                                    <select id="status" class="form-control">
                                        <option value="unspecified">Unspecified</option>
                                        <option value="active">Active</option>
                                        <option value="dormant">Dormant</option>
                                        <option value="failed">Failed</option>
                                        <option value="archived">Archived</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <input type="button" id="addCropBtn" class="btn btn-primary mb-2" value="Add crop">
                                </div>
                            </div>
                        </div>
                        <!-- form -->
                    </div>
                </main>
                <!-- Footer -->
                <div id="footer-placeholder"></div>
            </div>
        </div>
        <script src="../js/jquery-3.6.0.min.js"></script>
        <script src="../js/connection.js"></script>
        <script src="../js/scripts.js"></script>
        <script src="../js/add_crop.js"></script>
        <script src="../js/common.js"></script>
        <script src="../js/bootstrap.bundle.min.js"></script>
        <script src="../cordova.js"></script>
    </body>
</html>
