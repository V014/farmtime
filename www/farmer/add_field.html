        <div id="layoutSidenav">
            <div id="layoutSidenav_nav">
                <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                    <!-- Navbar placeholder -->
                    <div id="nav-placeholder"></div>
                </nav>
            </div>
            <div id="layoutSidenav_content">
                <main>
                    <div class="container-fluid px-4">
                        <h1 class="mt-4">Add field</h1>
                        <ol class="breadcrumb mb-4">
                            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                            <li class="breadcrumb-item active"><a href="field.html">Fields</a></li>
                        </ol>
                        <!-- form -->
                        <div class="card mb-4">
                            <div class="card-body">
                                <b>To add a field, fill in all the fields below.</b>
                                <div class="form-group mb-2">
                                    <label for="field_name">Field name</label>
                                    <input type="text" id="field_name" class="form-control" placeholder="e.g. Nancholi" required>
                                </div>

                                <div class="form-group mb-2">
                                    <label for="area_height">Area height (Metres)</label>
                                    <input type="number" id="area_height" class="form-control" placeholder="e.g. 50" required>
                                </div>

                                <div class="form-group mb-2">
                                    <label for="area_height">Area width (Metres)</label>
                                    <input type="number" id="area_width" class="form-control" placeholder="e.g. 50" required>
                                </div>

                                <div class="form-group mb-2">
                                    <label for="location">Location</label>
                                    <input type="text" id="location" class="form-control" placeholder="e.g gps coordinates" required>
                                </div>

                                <div class="form-group mb-2">
                                    <label for="soil_type">Soil type</label>
                                    <select id="soil_type" class="form-control">
                                        <option value="unspecified">Unspecified</option>
                                        <option value="loamy">Loamy</option>
                                        <option value="clay">Clay</option>
                                        <option value="sandy">Sandy</option>
                                    </select>
                                </div>

                                <div class="form-group mb-2">
                                    <label for="tenure_type">Tenure type</label>
                                    <select id="tenure_type" class="form-control">
                                        <option value="Unspecified">Unspecified</option>
                                        <option value="personal">Personal</option>
                                        <option value="rented">Rented</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <input type="button" id="addFieldBtn" class="btn btn-primary mb-2" value="Add field">
                                </div>
                            </div>
                        </div>
                        <!-- form -->
                    </div>
                </main>
                <!-- Footer -->
                <div id="footer-placeholder"></div>
            </div>
        </div>
